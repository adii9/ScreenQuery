<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #screenshot-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.4) blur(0px);
    }
    
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
    }
    
    #selection {
      position: absolute;
      border: 2px solid white;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      display: none;
    }
    
    .corner {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
    }
    .corner.tl { top: -5px; left: -5px; }
    .corner.tr { top: -5px; right: -5px; }
    .corner.bl { bottom: -5px; left: -5px; }
    .corner.br { bottom: -5px; right: -5px; }
    
    #size-label {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'SF Mono', 'Menlo', monospace;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    #instructions {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.15);
    }
    
    #instructions kbd {
      background: rgba(255, 255, 255, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: inherit;
    }
    
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <img id="screenshot-bg" alt="">
  <div id="loading">Loading capture...</div>
  <div id="overlay"></div>
  <div id="selection">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="size-label"></div>
  </div>
  <div id="instructions">
    Drag to select a region · <kbd>Esc</kbd> to cancel
  </div>
  
  <script>
    const img = document.getElementById('screenshot-bg');
    const selection = document.getElementById('selection');
    const sizeLabel = document.getElementById('size-label');
    const overlay = document.getElementById('overlay');
    const loading = document.getElementById('loading');
    
    let isDragging = false;
    let startX = 0, startY = 0;
    let currentRect = { x: 0, y: 0, width: 0, height: 0 };
    
    // Receive screenshot from main process
    window.screenQuery.onScreenshot((dataUrl) => {
      if (dataUrl && dataUrl.length > 1000) {
        img.src = dataUrl;
        img.onload = () => {
          loading.style.display = 'none';
        };
        img.onerror = () => {
          loading.textContent = 'Capture unavailable - check Screen Recording permission in System Settings';
        };
      } else {
        loading.textContent = 'Capture unavailable - grant Screen Recording permission';
      }
    });
    
    // Timeout: if no screenshot in 3 seconds, show error
    setTimeout(() => {
      if (loading.style.display !== 'none') {
        loading.textContent = 'Capture timeout - check Screen Recording permission';
      }
    }, 3000);
    
    overlay.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      selection.style.display = 'block';
      overlay.style.background = 'transparent';
      updateSelection(e.clientX, e.clientY);
    });
    
    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        updateSelection(e.clientX, e.clientY);
      }
    });
    
    document.addEventListener('mouseup', (e) => {
      if (isDragging) {
        isDragging = false;
        if (currentRect.width > 10 && currentRect.height > 10) {
          window.screenQuery.sendRegionSelected(currentRect);
        } else {
          window.screenQuery.sendRegionCancelled();
        }
      }
    });
    
    function updateSelection(mouseX, mouseY) {
      const x = Math.min(startX, mouseX);
      const y = Math.min(startY, mouseY);
      const width = Math.abs(mouseX - startX);
      const height = Math.abs(mouseY - startY);
      
      currentRect = { x, y, width, height };
      
      selection.style.left = x + 'px';
      selection.style.top = y + 'px';
      selection.style.width = width + 'px';
      selection.style.height = height + 'px';
      
      sizeLabel.textContent = `${Math.round(width)} × ${Math.round(height)}`;
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.screenQuery.sendRegionCancelled();
      }
    });
  </script>
</body>
</html>
